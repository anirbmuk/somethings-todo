name: somethings-todo production onpush

# Controls when the action will run.
on:
  # Triggers the workflow on push events but only for the master branch
  push:
    branches: [production]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  install:
    runs-on: ubuntu-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22.14.0

      - name: Cache node_modules
        id: cache-node-modules-pre
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache
            node_modules
          key: ${{ runner.os }}-build-somethings-todo-node-modules-${{ hashFiles('yarn.lock') }}

      - name: Install node_modules
        if: steps.cache-node-modules-pre.outputs.cache-hit != 'true'
        run: yarn install --frozen-lockfile

  build:
    needs: [install]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22.14.0
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache
            node_modules
          key: ${{ runner.os }}-build-somethings-todo-node-modules-${{ hashFiles('yarn.lock') }}

      - name: Build somethings-todo project
        run: yarn build

      - name: Archive build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist-somethings-todo
          path: dist

  deploy:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22.14.0
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache
            node_modules
          key: ${{ runner.os }}-build-somethings-todo-node-modules-${{ hashFiles('yarn.lock') }}
      - uses: actions/download-artifact@v8
        with:
          name: dist-somethings-todo
          path: dist
      - id: 'auth'
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}

      - name: Deploy somethings-todo project to firebase
        run: yarn host
